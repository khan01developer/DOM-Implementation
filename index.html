<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Implementation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="greeting">Hello,</h1>
    </header>
    <main>
        <div class="container">
            <div class="box" id="box-1">Red</div>
            <div class="box" id="box-2">Blue</div>
            <div class="box" id="box-3">Green</div>
            <div class="box" id="box-4">Yellow</div>
        </div>

        <form action="#">
            <input type="text" placeholder="Enter your name" id="name">
            <button type="submit" id="btn">Greet</button>
        </form>
        <p id="message"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
